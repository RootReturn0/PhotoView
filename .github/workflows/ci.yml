name: CI

on:
  pull_request:
  push:
    branches:
      - development
      - main

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build

      - run: cargo fmt --check
        working-directory: src-tauri

      - name: Run Rust tests
        if: runner.os != 'Windows'
        run: cargo test
        working-directory: src-tauri

      - name: Compile Rust tests on Windows
        if: runner.os == 'Windows'
        run: cargo test --no-run
        working-directory: src-tauri

      - run: pnpm tauri build --debug --no-bundle --ci
