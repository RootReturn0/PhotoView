<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="3; url=./en/index.html" />
    <title>PhotoView</title>
    <link rel="alternate" hreflang="zh-CN" href="./zh/index.html" />
    <link rel="alternate" hreflang="en" href="./en/index.html" />
    <link rel="icon" href="./assets/icon-128x128.png" />
    <script>
      const languages = navigator.languages && navigator.languages.length
        ? Array.from(navigator.languages)
        : [navigator.language || navigator.userLanguage || ""];
      const target = languages.some(function (language) {
        return String(language).toLowerCase().startsWith("zh");
      })
        ? "./zh/index.html"
        : "./en/index.html";

      window.location.replace(target);
    </script>
    <style>
      :root {
        color: #172033;
        background: #f6f8fb;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        text-align: center;
      }

      a {
        color: #2563eb;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p>正在打开 PhotoView...</p>
      <p><a href="./zh/index.html">中文</a> / <a href="./en/index.html">English</a></p>
    </main>
  </body>
</html>
